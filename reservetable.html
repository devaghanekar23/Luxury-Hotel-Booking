<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Your Stay | Luxury Hotel</title>
    <link rel="stylesheet" href="css/booking.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>

    <!-- Navbar -->

    <nav>
        <div class="logo">🏨 Luxury Hotel</div>

        <ul>
            <li><a href="index.html">🏨 Home</a></li>
            <li><a href="rooms.html">🛏 Rooms</a></li>
            <li><a href="dining.html">🍽 Dining</a></li>
            <li><a href="events.html">🎉 Events</a></li>
            <li><a href="reviews.html">⭐ Reviews</a></li>
            <li><a href="contact.html">📞 Contact</a></li>

        </ul>

        <a href="booking.html" class="btn">📅 Book Now</a>
    </nav>

    <body>
        <section class="hero">
            <div class="hero-left">
                <h1>Dining Experience</h1>
                <p>Savor exquisite flavors in an ambiance</p>
                <p>crafted for unforgettable moments.</p>

                <div class="features">
                    <div>
                        <i class="fa-solid fa-bell-concierge"></i>
                        <h3>FINE<br>CUISINE</h3>
                    </div>

                    <div>
                        <i class="fa-regular fa-star"></i>
                        <h3>EXCEPTIONAL<br>SERVICES</h3>
                    </div>

                    <div>
                        <i class="fa-solid fa-wine-glass"></i>
                        <h3>PREMIUM<br>AMBIENCE</h3>
                    </div>
                </div>
            </div>

            <div class="booking-card">
                <div class="booking-title">
                    <h2> Reserve A Table</h2>
                    </dv>
                    <form>
                        <div class="row">
                            <div class="input-content">
                                <label>Full Name</label>
                                <div class="input-box">
                                    <i class="fa-regular fa-user"></i>
                                    <input type="text" placeholder="Enter Full Name">
                                </div>
                            </div>
                            <div class="input-content">
                                <label>Email Address</label>
                                <div class="input-box">
                                    <i class="fa-regular fa-envelope"></i>
                                    <input type="email" placeholder="Enter Email">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="input-content">
                                <label>Phone Numbar </label>
                                <div class="input-box">
                                    <i class="fa-solid fa-phone"></i>
                                    <input type="tel" placeholder="Phone Number">
                                </div>
                            </div>
                            <div class="input-content">
                                <label>Date</label>
                                <div class="input-box">
                                    <i class="fa-solid fa-calendar"></i>
                                    <input type="date" placeholder="Date">
                                </div>
                            </div>
                        </div>

                        <div class="row">
                            <div class="input-content">
                                <label>Time</label>
                                <div class="input-box">
                                    <i class="fa-solid fa-clock"></i>
                                    <input type="time" placeholder="Time">
                                </div>
                            </div>
                            <div class="input-content">
                                <label>Number Of Guests</label>
                                <div class="input-box">
                                    <i class="fa-solid fa-user-group"></i>
                                    <input type="number" placeholder="Number Of Guests" min="1" max="10">
                                </div>
                            </div>
                        </div>
                        <div class="input-content">
                            <label>Special Requests (optional)</label>
                            <div class="input-box">
                                <i class="fa-solid fa-comment"></i>
                                <input type="text" placeholder="Special Requests">
                            </div>
                        </div>

                        <div class="button-group">
                            <button type="submit">
                                <h3><i class="fa-solid fa-calendar-check"></i> Reserve A Table</h3>
                            </button>
                      </div>
                    </div>
                </form>
            </div>
        </section>
    </body>

</html>
